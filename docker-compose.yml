version: '3.8'

services:
  influxdb:
    image: influxdb:2.7-alpine
    ports:
      - "8086:8086"
    volumes:
      - influxdb-data:/var/lib/influxdb2
    environment:
      INFLUXDB_DB: mydb
      INFLUXDB_ADMIN_USER: ${INFLUXDB_USERNAME:-extreme}
      INFLUXDB_ADMIN_PASSWORD: ${INFLUXDB_PASSWORD:-Extr3m3!}
      INFLUXDB_ADMIN_TOKEN: ${INFLUXDB_TOKEN:-mytoken}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8086/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  influx-dashboard:
    build: .
    ports:
      - "3001:3001"
    depends_on:
      influxdb:
        condition: service_healthy
    environment:
      FLASK_ENV: production
      INFLUXDB_URL: ${INFLUXDB_URL:-http://influxdb:8086}
      INFLUXDB_USERNAME: ${INFLUXDB_USERNAME:-extreme}
      INFLUXDB_PASSWORD: ${INFLUXDB_PASSWORD:-Extr3m3!}
      INFLUXDB_ORG: ${INFLUXDB_ORG:-}
      INFLUXDB_TOKEN: ${INFLUXDB_TOKEN:-}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      SESSION_TTL_HOURS: ${SESSION_TTL_HOURS:-8}
      CACHE_TTL_SECONDS: ${CACHE_TTL_SECONDS:-300}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3001}
      BASIC_AUTH_USER: ${BASIC_AUTH_USER:-}
      BASIC_AUTH_PASSWORD: ${BASIC_AUTH_PASSWORD:-}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  influxdb-data:
